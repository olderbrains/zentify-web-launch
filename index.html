<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentify Aroma — Launching Soon</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            position: relative;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(15, 5, 20, 0.75) 0%, rgba(40, 10, 50, 0.6) 50%, rgba(20, 5, 30, 0.8) 100%);
            z-index: -1;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(720deg) scale(1);
                opacity: 0;
            }
        }

        /* Floating golden orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(1px);
            animation: floatOrb ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes floatOrb {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(30px, -40px) scale(1.1);
            }
            50% {
                transform: translate(-20px, -80px) scale(0.9);
            }
            75% {
                transform: translate(40px, -30px) scale(1.05);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        .logo-topleft {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 10;
            animation: fadeInDown 1s ease-out 0.3s both;
        }

        .logo-topleft img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #d4af37, #f5e6a3, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 1s ease-out 0.5s both;
        }

        .tagline {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 3rem;
            animation: fadeInDown 1s ease-out 0.7s both;
        }

        .launch-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 2rem;
            animation: fadeInUp 1s ease-out 0.9s both;
        }

        .countdown {
            display: flex;
            gap: clamp(1rem, 3vw, 2.5rem);
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out 1.1s both;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .countdown-value {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(180deg, #ffffff, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-width: 80px;
            position: relative;
        }

        .countdown-value::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }

        .countdown-label {
            font-size: clamp(0.6rem, 1.2vw, 0.8rem);
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(212, 175, 55, 0.8);
            margin-top: 1rem;
        }

        .separator {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 3rem);
            color: rgba(212, 175, 55, 0.4);
            align-self: flex-start;
            margin-top: 0.5rem;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .notify-section {
            animation: fadeInUp 1s ease-out 1.3s both;
        }

        .notify-text {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .notify-form {
            display: flex;
            gap: 0;
            max-width: 420px;
            margin: 0 auto;
            border-radius: 50px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .notify-form:focus-within {
            border-color: rgba(212, 175, 55, 0.7);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
        }

        .notify-form input {
            flex: 1;
            padding: 1rem 1.5rem;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .notify-form input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .notify-form button {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            border: none;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .notify-form button:hover {
            background: linear-gradient(135deg, #f5e6a3, #d4af37);
            color: #1a1a1a;
        }

        .social-links {
            margin-top: 3rem;
            display: flex;
            gap: 1.5rem;
            animation: fadeInUp 1s ease-out 1.5s both;
        }

        .social-links a {
            width: 44px;
            height: 44px;

            border: 1px solid rgba(212, 175, 55, 0.3);
